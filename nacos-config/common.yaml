# =============================================================================
# Nacos 共享配置 —— common.yaml
#
# 用途：各服务通过 spring.config.import 的 optional:nacos:common.yaml 加载本文件，
#       存放所有服务通用、且原本在各自 application.yml 中重复的配置。
#
# 部署位置（Nacos 控制台 → 配置管理 → 配置列表）：
#   - Data ID:   common.yaml
#   - Group:     DEFAULT_GROUP
#   - 命名空间:   与各服务 spring.cloud.nacos.config.namespace（NACOS_NAMESPACE）一致
#   - 配置格式:   YAML
#
# 注意：本文件仅作版本库内的“模板/备份”，真正生效的是 Nacos 上的同名配置。
#       修改后需同步更新到 Nacos（refreshEnabled=true 时支持动态刷新）。
# =============================================================================

# mybatis-plus 通用配置（user-service / picture-service 使用）
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除的实体字段名
      logic-delete-value: 1 # 逻辑已删除值（默认为 1）
      logic-not-delete-value: 0 # 逻辑未删除值（默认为 0）

# Knife4j 接口文档通用配置
knife4j:
  enable: true
  setting:
    language: zh_cn
